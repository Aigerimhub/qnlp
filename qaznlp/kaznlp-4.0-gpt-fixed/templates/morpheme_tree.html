<!-- templates/morpheme_tree.html -->
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Морфемдік ағаш</title>
    <style>
        .node {
            display: inline-block;
            margin: 10px;
            padding: 8px;
            border: 1px solid #aaa;
            border-radius: 8px;
            background-color: #f0f0f0;
        }
        .tree {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h2>Морфемдік ағаш визуализациясы</h2>
    <form method="post">
        <input type="text" name="word" placeholder="Сөзді енгізіңіз" required>
        <button type="submit">Анализ</button>
    </form>
    {% if parts %}
        <div class="tree">
            {% for part in parts %}
                <div class="node">
                    {{ part.part }}<br>
                    <small>{{ part.type }}</small>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</body>
</html>
